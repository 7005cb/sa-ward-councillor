<div class="sa-support-scheme-card">
    <div class="sa-support-scheme-card-image">
        <a href="__url__">
            <img src="__image__" alt="__title__" onerror="this.src='modules/sa/support_scheme/template/images/default-campaign.png'">
        </a>
        <span class="sa-support-scheme-category">__category__</span>
    </div>
    <div class="sa-support-scheme-card-body">
        <h3 class="sa-support-scheme-card-title">
            <a href="__url__">__title__</a>
        </h3>
        <p class="sa-support-scheme-card-desc">__description__</p>
        <div class="sa-support-scheme-progress">
            <div class="sa-support-scheme-progress-bar" style="width: __progress__%"></div>
        </div>
        <div class="sa-support-scheme-stats">
            <div class="sa-support-scheme-stat">
                <span class="sa-support-scheme-stat-value">R __current_amount__</span>
                <span class="sa-support-scheme-stat-label">raised of R __goal_amount__</span>
            </div>
            <div class="sa-support-scheme-stat">
                <span class="sa-support-scheme-stat-value">__donations_count__</span>
                <span class="sa-support-scheme-stat-label">donations</span>
            </div>
        </div>
        <a href="__url__" class="sa-support-scheme-btn sa-support-scheme-btn-donate">Donate Now</a>
    </div>
</div>
